name: Unity Personal license setup help
on:
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  activation:
    name: Show Unity Personal license setup steps
    runs-on: ubuntu-latest
    steps:
      - name: Print setup instructions
        run: |
          cat <<'EOF'
          GameCI no longer supports generating Unity Personal activation files from GitHub Actions.

          For Unity Personal:
          1. Open Unity Hub locally.
          2. Sign in with the Unity account used for CI.
          3. Go to Preferences > Licenses.
          4. Click Add and choose Get a free personal license.
          5. Copy the generated .ulf file contents into the GitHub repository secret UNITY_LICENSE.

          Default .ulf file locations:
          - Windows: C:\ProgramData\Unity\Unity_lic.ulf
          - macOS: /Library/Application Support/Unity/Unity_lic.ulf
          - Linux: ~/.local/share/unity3d/Unity/Unity_lic.ulf

          GitHub secret path:
          Settings > Secrets and variables > Actions > New repository secret
          EOF
